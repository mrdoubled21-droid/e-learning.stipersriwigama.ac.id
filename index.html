<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning STIPER SRIWIGAMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Library SheetJS untuk Export ke Excel sungguhan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Animasi Sidebar untuk transisi halus */
        #sidebar { transition: all 0.3s ease-in-out; }
        /* Menyembunyikan scrollbar tapi tetap bisa scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden flex flex-col">

    <div id="app-container" class="w-full h-full">
        <!-- Area utama tempat seluruh halaman di-render oleh JavaScript -->
    </div>

    <script>
        // ==============================================================================
        // 1. DATA STATE & VARIABEL GLOBAL (ID = NIP/NIM)
        // ==============================================================================
        
        let users = [
            { id: '123456789', username: 'admin', password: 'password', role: 'admin', name: 'Administrator', nip: '123456789', email: 'admin@stiper.ac.id', phone: '081234567890', address: 'Kampus STIPER', gender: 'Laki-laki', firstAccess: 'Senin, 1 Juni 2026 08:00:00 WIB', lastAccess: 'Senin, 22 Juni 2026 05:00:00 WIB' },
            { id: '198001012005011001', username: 'dosen1', password: 'password', role: 'dosen', name: 'Dr. Budi Santoso', department: 'Agribisnis', nip: '198001012005011001', email: 'budi.santoso@sriwigama.ac.id', phone: '081298765432', address: 'Jl. Merdeka No. 1', gender: 'Laki-laki', firstAccess: 'Rabu, 3 Juni 2026 09:15:00 WIB', lastAccess: 'Jumat, 19 Juni 2026 14:30:00 WIB' },
            { id: '197502022000032001', username: 'dosen2', password: 'password', role: 'dosen', name: 'Ir. Siti Aminah, M.P.', department: 'Agroteknologi', nip: '197502022000032001', email: 'siti.aminah@sriwigama.ac.id', phone: '081312345678', address: 'Jl. Sudirman No. 2', gender: 'Perempuan', firstAccess: 'Kamis, 4 Juni 2026 10:00:00 WIB', lastAccess: 'Senin, 22 Juni 2026 04:15:00 WIB' },
            { id: '2021001', username: 'mhs1', password: 'password', role: 'mahasiswa', name: 'Andi Saputra', major: 'Agribisnis', semester: 3, nip: '2021001', email: 'andi@mhs.sriwigama.ac.id', phone: '085712345678', address: 'Jl. Mawar No. 3', gender: 'Laki-laki', firstAccess: 'Senin, 8 Juni 2026 11:20:00 WIB', lastAccess: 'Minggu, 21 Juni 2026 19:45:00 WIB' },
            { id: '2021002', username: 'mhs2', password: 'password', role: 'mahasiswa', name: 'Dewi Lestari', major: 'Agroteknologi', semester: 5, nip: '2021002', email: 'dewi@mhs.sriwigama.ac.id', phone: '085887654321', address: 'Jl. Melati No. 4', gender: 'Perempuan', firstAccess: 'Selasa, 9 Juni 2026 13:10:00 WIB', lastAccess: 'Sabtu, 20 Juni 2026 08:30:00 WIB' },
        ];

        let courses = [
            { 
                id: 'c1', title: 'Pengantar Ilmu Pertanian', lecturerId: '198001012005011001', department: 'Agribisnis', enrolled: ['2021001'], 
                modules: [{ id: 'm1', title: 'Modul 1: Sejarah Pertanian', content: 'Pertanian dimulai sejak zaman prasejarah...', fileName: 'Modul_1_Sejarah.pdf' }],
                quizzes: [
                    { id: 'q1', title: 'Kuis Evaluasi Modul 1', questions: [
                        { q: 'Kapan pertanian mulai dikenal manusia?', options: ['Zaman Modern', 'Zaman Prasejarah', 'Abad Pertengahan', 'Era Industri'], answer: 1 }
                    ]}
                ],
                quizScores: { 'q1': { '2021001': 100 } } 
            },
            { id: 'c2', title: 'Dasar-dasar Agronomi', lecturerId: '197502022000032001', department: 'Agroteknologi', enrolled: ['2021001', '2021002'], modules: [], quizzes: [], quizScores: {} },
            { id: 'c3', title: 'Ekonomi Pertanian', lecturerId: '198001012005011001', department: 'Agribisnis', enrolled: [], modules: [], quizzes: [], quizScores: {} },
        ];

        let systemLogs = [];
        let currentUser = null;
        let activeTab = 'dashboard';
        let selectedCourse = null;
        
        let isSidebarOpen = true; // Status Sidebar untuk Desktop

        // States Tambahan
        let editingModule = null;
        let adminEditingUser = null; 
        let adminResettingUser = null; 
        let dosenEditingCourse = null; 
        let logFilterRole = 'all';
        let manageUserFilter = 'all';
        let clockInterval = null;
        let profileSuccessMsg = '';

        // Status untuk Kuis
        let isEditingQuiz = false; 
        let currentQuizData = null; 
        let takingQuizId = null; 

        const appContainer = document.getElementById('app-container');

        // ==============================================================================
        // 2. FUNGSI UTILITAS & PENCATATAN LOG
        // ==============================================================================
        
        function getFormattedTime() {
            const now = new Date();
            return now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' }) + ' WIB';
        }

        function addLog(action, userObj) {
            systemLogs.unshift({
                time: getFormattedTime(),
                role: userObj.role,
                user: userObj.name,
                action: action
            });
        }

        function render() {
            if (!currentUser) { renderLogin(); } 
            else { renderMainLayout(); }
        }

        // ==============================================================================
        // 3. HALAMAN LOGIN
        // ==============================================================================
        function renderLogin() {
            appContainer.innerHTML = `
                <div class="min-h-screen bg-green-50 flex items-center justify-center p-4">
                    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-green-600 fade-in">
                        <div class="flex flex-col items-center mb-6">
                            <img src="Logo STIPER.jpg" alt="Logo STIPER SRIWIGAMA" class="h-24 w-auto object-contain mb-3" onerror="this.onerror=null; this.src='https://placehold.co/100x100/166534/FFF?text=Logo';">
                            <h1 class="text-2xl font-bold text-gray-800 text-center">STIPER SRIWIGAMA</h1>
                            <p class="text-gray-500 text-sm">Portal E-Learning</p>
                        </div>
                        
                        <div id="login-error" class="hidden bg-red-100 text-red-600 p-3 rounded mb-4 text-sm text-center"></div>
                        
                        <form id="login-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none" placeholder="Masukkan username" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none" placeholder="Masukkan password" required>
                            </div>
                            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 transition duration-200">Masuk</button>
                        </form>

                        <div class="mt-6">
                            <div class="relative"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Akun Demo</span></div></div>
                            <div class="mt-4 text-xs text-gray-500 text-center space-y-1">
                                <p><strong>Admin:</strong> admin | password</p>
                                <p><strong>Dosen:</strong> dosen1, dosen2 | password</p>
                                <p><strong>Mahasiswa:</strong> mhs1, mhs2 | password</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const user = users.find(x => x.username === u && x.password === p);
                
                if (user) {
                    currentUser = user;
                    currentUser.lastAccess = getFormattedTime();
                    addLog('Login ke sistem', currentUser);
                    activeTab = 'dashboard';
                    render();
                } else {
                    const err = document.getElementById('login-error');
                    err.textContent = 'Username atau password salah!';
                    err.classList.remove('hidden');
                }
            });
        }

        // ==============================================================================
        // 4. KERANGKA UTAMA APLIKASI (NAVBAR & SIDEBAR)
        // ==============================================================================
        function renderMainLayout() {
            const sidebarClass = isSidebarOpen 
                ? 'w-64 absolute md:relative z-40 h-full border-r shadow-xl md:shadow-none bg-white transition-all duration-300' 
                : 'w-0 md:w-20 overflow-hidden border-r bg-white h-full transition-all duration-300';

            appContainer.innerHTML = `
                <div class="flex flex-col h-screen fade-in bg-gray-100">
                    <!-- NAVBAR ATAS -->
                    <nav class="bg-white border-b-4 border-green-600 shadow-sm z-50 shrink-0">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex justify-between h-16">
                                <div class="flex items-center">
                                    <button onclick="toggleSidebar()" class="mr-4 p-2 rounded-md hover:bg-green-100 text-gray-600 outline-none cursor-pointer" title="Toggle Sidebar">
                                        <i class="fas fa-bars text-xl"></i>
                                    </button>
                                    <i class="fas fa-leaf text-2xl text-green-700 mr-3 hidden sm:block"></i>
                                    <span class="font-bold text-lg md:text-xl text-green-800 hidden sm:block">STIPER SRIWIGAMA</span>
                                </div>
                                <div class="flex items-center space-x-2 md:space-x-3">
                                    <button onclick="changeTab('profile')" class="flex items-center space-x-2 bg-green-100 hover:bg-green-200 text-green-800 px-3 md:px-4 py-2 rounded-full transition-colors border border-green-200">
                                        <div class="bg-green-600 text-white p-1 rounded-full text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-user"></i></div>
                                        <span class="text-sm font-medium hidden md:block max-w-[150px] truncate">${currentUser.name}</span>
                                    </button>
                                    <button onclick="logout()" class="flex items-center space-x-2 bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-md transition-colors border border-red-200" title="Keluar">
                                        <i class="fas fa-sign-out-alt"></i>
                                        <span class="text-sm font-medium hidden sm:block">Keluar</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <div class="flex flex-1 overflow-hidden relative w-full">
                        <!-- SIDEBAR KIRI -->
                        <aside id="sidebar" class="${sidebarClass}">
                            <div class="p-3 space-y-2 mt-2" id="sidebar-menu">
                            </div>
                        </aside>

                        <!-- KONTEN UTAMA KANAN -->
                        <main class="flex-1 overflow-y-auto p-4 md:p-6 w-full" id="main-content">
                        </main>
                        
                        ${isSidebarOpen ? `<div class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-30" onclick="toggleSidebar()"></div>` : ''}
                    </div>
                </div>
            `;
            renderSidebarMenu();
            renderContent();
        }

        // --- Render Isi Sidebar ---
        function renderSidebarMenu() {
            const menu = document.getElementById('sidebar-menu');
            const alignClass = isSidebarOpen ? 'justify-start' : 'justify-center';
            const mrClass = isSidebarOpen ? 'mr-3' : 'md:mr-0';
            const textClass = isSidebarOpen ? 'block' : 'hidden'; 
            
            let html = `
                <button onclick="changeTab('dashboard')" class="w-full flex items-center p-3 rounded ${activeTab === 'dashboard' ? 'bg-green-100 text-green-800 font-semibold' : 'text-gray-600 hover:bg-gray-100'} ${alignClass}" title="Beranda">
                    <i class="fas fa-home w-5 ${mrClass}"></i>
                    <span class="sidebar-text ${textClass} whitespace-nowrap">Beranda</span>
                </button>
            `;

            const coursesLabel = currentUser.role === 'admin' ? 'Semua Kelas' : currentUser.role === 'dosen' ? 'Kelola Kelas' : 'Kelas Saya';
            html += `
                <button onclick="changeTab('courses')" class="w-full flex items-center p-3 rounded ${activeTab === 'courses' ? 'bg-green-100 text-green-800 font-semibold' : 'text-gray-600 hover:bg-gray-100'} ${alignClass}" title="${coursesLabel}">
                    <i class="fas fa-chalkboard-teacher w-5 ${mrClass}"></i>
                    <span class="sidebar-text ${textClass} whitespace-nowrap">${coursesLabel}</span>
                </button>
            `;

            // Menu Khusus Mahasiswa (Laporan)
            if (currentUser.role === 'mahasiswa') {
                 html += `
                    <button onclick="changeTab('reports')" class="w-full flex items-center p-3 rounded ${activeTab === 'reports' ? 'bg-blue-100 text-blue-800 font-semibold' : 'text-gray-600 hover:bg-gray-100'} ${alignClass} mt-4 border-t border-gray-200" title="Laporan">
                        <i class="fas fa-chart-line w-5 text-blue-600 ${mrClass}"></i>
                        <span class="sidebar-text ${textClass} whitespace-nowrap">Laporan</span>
                    </button>
                `;
            }

            // Menu Khusus Admin
            if (currentUser.role === 'admin') {
                html += `
                    <button onclick="changeTab('manage-users')" class="w-full flex items-center p-3 rounded ${activeTab === 'manage-users' ? 'bg-purple-100 text-purple-800 font-semibold' : 'text-gray-600 hover:bg-gray-100'} ${alignClass} mt-4 border-t border-gray-200" title="Kelola Pengguna">
                        <i class="fas fa-users-cog w-5 text-purple-600 ${mrClass}"></i>
                        <span class="sidebar-text ${textClass} whitespace-nowrap">Kelola Pengguna</span>
                    </button>
                    <button onclick="changeTab('system-logs')" class="w-full flex items-center p-3 rounded ${activeTab === 'system-logs' ? 'bg-gray-800 text-white font-semibold' : 'text-gray-600 hover:bg-gray-100'} ${alignClass}" title="Log Pengguna">
                        <i class="fas fa-list w-5 ${activeTab === 'system-logs' ? 'text-gray-300' : 'text-gray-500'} ${mrClass}"></i>
                        <span class="sidebar-text ${textClass} whitespace-nowrap">Log Pengguna</span>
                    </button>
                `;
            }
            menu.innerHTML = html;
        }

        // ==============================================================================
        // 5. ROUTER (PENGATUR TAMPILAN KONTEN)
        // ==============================================================================
        function renderContent() {
            if(clockInterval) { clearInterval(clockInterval); clockInterval = null; }

            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="max-w-5xl mx-auto w-full" id="content-inner"></div>';
            const inner = document.getElementById('content-inner');

            if (activeTab === 'profile') {
                inner.innerHTML = getProfileHTML();
                attachProfileEvents();
            } else if (activeTab === 'dashboard' && !selectedCourse) {
                inner.innerHTML = getDashboardHTML();
            } else if (activeTab === 'manage-users' && currentUser.role === 'admin') {
                inner.innerHTML = getManageUsersHTML();
                attachManageUsersEvents();
                attachResetPasswordEvents();
            } else if (activeTab === 'system-logs' && currentUser.role === 'admin') {
                inner.innerHTML = getSystemLogsHTML();
                initClock();
            } else if (activeTab === 'reports' && currentUser.role === 'mahasiswa') {
                inner.innerHTML = getReportsHTML();
            } else if (activeTab === 'courses' && !selectedCourse) {
                if (dosenEditingCourse) inner.innerHTML = getDosenCourseFormHTML();
                else inner.innerHTML = getCoursesHTML();
            } else if (selectedCourse) {
                if (takingQuizId) inner.innerHTML = getQuizTakerHTML();
                else if (isEditingQuiz) inner.innerHTML = getQuizEditorHTML();
                else inner.innerHTML = getCourseDetailHTML();
            }
        }

        // ==============================================================================
        // 6. MENU BERANDA (DASHBOARD)
        // ==============================================================================
        function getDashboardHTML() {
            const totalMateri = courses.reduce((acc, curr) => acc + (curr.modules ? curr.modules.length : 0), 0);
            return `
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Selamat Datang, <span class="text-green-700">${currentUser.name}</span></h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white rounded-lg shadow-sm p-6 border-l-4 border-blue-500">
                        <div class="flex items-center">
                            <div class="p-3 bg-blue-100 rounded-full mr-4"><i class="fas fa-book text-blue-600 text-xl"></i></div>
                            <div><p class="text-sm text-gray-500 font-medium">Total Kelas</p><p class="text-2xl font-bold text-gray-800">${courses.length}</p></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-6 border-l-4 border-green-500">
                        <div class="flex items-center">
                            <div class="p-3 bg-green-100 rounded-full mr-4"><i class="fas fa-file-alt text-green-600 text-xl"></i></div>
                            <div><p class="text-sm text-gray-500 font-medium">Total Materi</p><p class="text-2xl font-bold text-gray-800">${totalMateri}</p></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-6 border-l-4 border-purple-500">
                        <div class="flex items-center">
                            <div class="p-3 bg-purple-100 rounded-full mr-4"><i class="fas fa-users text-purple-600 text-xl"></i></div>
                            <div><p class="text-sm text-gray-500 font-medium">Pengguna</p><p class="text-2xl font-bold text-gray-800">${users.length}</p></div>
                        </div>
                    </div>
                </div>

                <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6 mb-6 shadow-sm">
                    <h3 class="text-lg font-bold text-yellow-800 mb-2"><i class="fas fa-bullhorn mr-2"></i>Pengumuman Kampus</h3>
                    <p class="text-yellow-700">Pemberitahuan: Fitur ujian dan kuis untuk Dosen kini telah diaktifkan. Mahasiswa wajib memperhatikan jadwal kuis pada masing-masing kelas.</p>
                </div>
            `;
        }

        // ==============================================================================
        // 7. MENU PROFIL PENGGUNA
        // ==============================================================================
        function getProfileHTML() {
            let msgHtml = '';
            if (profileSuccessMsg) {
                msgHtml = `<div class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg shadow-sm"><i class="fas fa-check-circle mr-2"></i> ${profileSuccessMsg}</div>`;
                setTimeout(() => { profileSuccessMsg = ''; renderContent(); }, 4000);
            }

            const isAdmin = currentUser.role === 'admin';
            const isMhs = currentUser.role === 'mahasiswa';
            const isDosen = currentUser.role === 'dosen';
            const readOnly = isMhs || isDosen; 
            
            const idLabel = isMhs ? 'NIM' : 'NIP';
            const depLabel = isMhs ? 'Program Studi' : 'Departemen/Jabatan';
            const depValue = isMhs ? (currentUser.major || '') : (currentUser.department || '');

            const historyTitle = isDosen ? "Aktivitas Login" : "Riwayat Aktivitas Akun";

            let formFieldsHtml = '';

            // --- Formulir Khusus Admin ---
            if (isAdmin) {
                formFieldsHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="block text-sm font-medium mb-1">Username</label><input type="text" value="${currentUser.username}" class="w-full p-2 border bg-gray-50 rounded text-gray-500" disabled></div>
                        <div><label class="block text-sm font-medium mb-1">Nama Lengkap</label><input type="text" id="p-name" value="${currentUser.name}" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" required></div>
                        <div class="md:col-span-2 pt-2 border-t mt-2">
                            <label class="block text-sm font-medium mb-1"><i class="fas fa-lock mr-1 text-gray-500"></i> Ubah Password (Opsional)</label>
                            <input type="password" id="p-pass" placeholder="Biarkan kosong jika tidak ingin mengubah password" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500">
                        </div>
                    </div>
                `;
            } 
            // --- Formulir Khusus Dosen & Mahasiswa ---
            else {
                formFieldsHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="block text-sm font-medium mb-1">Nama Lengkap</label><input type="text" id="p-name" value="${currentUser.name}" class="w-full p-2 border rounded bg-gray-50 text-gray-500" disabled></div>
                        <div><label class="block text-sm font-medium mb-1">Username</label><input type="text" value="${currentUser.username}" class="w-full p-2 border bg-gray-50 rounded text-gray-500" disabled></div>
                        <div><label class="block text-sm font-medium mb-1">${idLabel}</label><input type="text" id="p-nip" value="${currentUser.nip || ''}" class="w-full p-2 border rounded bg-gray-50 text-gray-500" disabled></div>
                        <div><label class="block text-sm font-medium mb-1">${depLabel}</label><input type="text" id="p-dep" value="${depValue}" class="w-full p-2 border rounded bg-gray-50 text-gray-500" disabled></div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-1">Email</label>
                            <input type="email" id="p-email" value="${currentUser.email || ''}" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" ${isMhs ? 'pattern=".*@mhs\\.sriwigama\\.ac\\.id$" title="Harus berdomain @mhs.sriwigama.ac.id"' : 'pattern=".*@sriwigama\\.ac\\.id$" title="Harus berdomain @sriwigama.ac.id"'} required>
                            <p class="text-xs text-gray-500 mt-1">Gunakan email berdomain ${isMhs ? '@mhs.sriwigama.ac.id' : '@sriwigama.ac.id'}</p>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Nomor Handphone</label><input type="text" id="p-phone" value="${currentUser.phone || ''}" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500"></div>
                        
                        <div class="md:col-span-2 pt-2 border-t mt-2">
                            <label class="block text-sm font-medium mb-1"><i class="fas fa-lock mr-1 text-gray-500"></i> Ubah Password (Opsional)</label>
                            <input type="password" id="p-pass" placeholder="Biarkan kosong jika tidak ingin mengubah password" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500">
                        </div>

                        <!-- Catatan Peringatan -->
                        <div class="col-span-1 md:col-span-2 mt-2 text-yellow-800 bg-yellow-50 p-4 rounded-lg text-sm flex items-start border border-yellow-300 shadow-sm">
                            <i class="fas fa-exclamation-triangle mt-0.5 mr-3 text-yellow-600 text-lg"></i> 
                            <span><strong>Catatan Penting:</strong> Untuk melakukan perubahan data pada Nama Lengkap, ${idLabel}, Username, dan ${depLabel} hanya bisa dilakukan dengan pengisian formulir fisik yang diajukan melalui Admin secara langsung.</span>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Pengaturan Akun & Profil</h2>
                    ${msgHtml}
                    
                    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
                        <h3 class="text-lg font-bold text-gray-700 mb-4 flex items-center"><i class="fas fa-user-edit mr-2 text-green-600"></i> Informasi Data Diri</h3>
                        <form id="profile-form" class="space-y-5">

        // --- Fitur Hapus Massal ---
        window.executeMassDelete = function() {
            const role = document.getElementById('md-role').value;
            const major = document.getElementById('md-major').value.trim();
            const semester = document.getElementById('md-semester').value.trim();
            
            if(!role && !major && !semester) {
                return alert('Pilih setidaknya satu kriteria untuk menghapus massal!');
            }
            
            if(confirm('Anda yakin ingin menghapus pengguna berdasarkan kriteria ini? Tindakan ini tidak dapat dibatalkan.')) {
                const initialCount = users.length;
                users = users.filter(u => {
                    if (u.id === currentUser.id) return true; // Proteksi diri sendiri
                    
                    let match = true;
                    if (role && u.role !== role) match = false;
                    if (major && u.major !== major && u.department !== major) match = false;
                    if (semester && String(u.semester) !== semester) match = false;
                    
                    return !match; // Jika cocok dengan kriteria hapus, kembalikan false agar terhapus
                });
                const deletedCount = initialCount - users.length;
                alert(`${deletedCount} pengguna berhasil dihapus dari sistem.`);
                renderContent();
            }
        }

            `;

            let addModBtn = isMyCourse ? `<button onclick="addModule()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded text-sm shadow-sm"><i class="fas fa-cloud-upload-alt mr-1"></i> Upload File / Materi</button>` : '';
            html += `<div class="flex flex-wrap justify-between items-center mb-4 gap-2"><h3 class="text-xl font-bold text-gray-800"><i class="fas fa-book-open mr-2 text-green-600"></i> Materi Pembelajaran</h3>${addModBtn}</div><div class="space-y-4 mb-8">`;
            
            if (!selectedCourse.modules || selectedCourse.modules.length === 0) {
                html += `<div class="bg-white rounded border p-8 text-center text-gray-500 border-dashed border-2">Belum ada materi.</div>`;
            } else {
                selectedCourse.modules.forEach(mod => {
                    if (editingModule === mod.id) {
                        html += `
                            <div class="bg-white rounded border p-5 border-l-4 border-blue-500 shadow-md">
                                <input type="text" id="edit-mod-title" value="${mod.title}" class="w-full text-lg p-2 border rounded outline-none mb-3">
                                <textarea id="edit-mod-content" class="w-full p-2 border rounded outline-none min-h-[100px] mb-3">${mod.content}</textarea>
                                <div class="flex justify-end gap-2 pt-3"><button onclick="editingModule=null; renderContent();" class="px-4 py-2 border rounded text-sm">Batal</button><button onclick="saveModule('${mod.id}')" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">Simpan</button></div>
                            </div>`;
                    } else {
                        let actions = isMyCourse ? `<button onclick="editingModule='${mod.id}'; renderContent();" class="text-blue-600 px-2 text-sm"><i class="fas fa-edit"></i></button><button onclick="deleteModule('${mod.id}')" class="text-red-600 px-2 text-sm"><i class="fas fa-trash"></i></button>` : '';
                        html += `
                            <div class="bg-white rounded-lg border shadow-sm"><div class="bg-gray-50 p-4 border-b flex justify-between">
                            <h4 class="font-bold text-gray-800"><i class="fas fa-folder text-green-600 mr-2"></i>${mod.title}</h4><div>${actions}</div></div>
                            <div class="p-5 text-sm text-gray-700 whitespace-pre-wrap">${mod.content}</div></div>`;
                    }
                });
            }
            html += `</div>`;

            let addQuizBtn = isMyCourse ? `<button onclick="createNewQuiz()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded text-sm shadow-sm"><i class="fas fa-plus mr-1"></i> Buat Kuis Baru</button>` : '';
            html += `<div class="flex flex-wrap justify-between items-center mb-4 gap-2"><h3 class="text-xl font-bold text-gray-800"><i class="fas fa-tasks mr-2 text-purple-600"></i> Evaluasi & Kuis</h3>${addQuizBtn}</div><div class="space-y-4">`;

            if (!selectedCourse.quizzes || selectedCourse.quizzes.length === 0) {
                html += `<div class="bg-white rounded border p-8 text-center text-gray-500 border-dashed border-2">Belum ada kuis/ujian tersedia.</div>`;
            } else {
                selectedCourse.quizzes.forEach(quiz => {
                    let score = (selectedCourse.quizScores && selectedCourse.quizScores[quiz.id] && selectedCourse.quizScores[quiz.id][currentUser.id] !== undefined) 
                                ? selectedCourse.quizScores[quiz.id][currentUser.id] : null;

                    let qActions = '';
                    if (isMyCourse) {
                        qActions = `<button onclick="editQuiz('${quiz.id}')" class="text-blue-600 px-2 text-sm"><i class="fas fa-edit"></i> Edit</button>
                                    <button onclick="deleteQuiz('${quiz.id}')" class="text-red-600 px-2 text-sm"><i class="fas fa-trash"></i> Hapus</button>`;
                    } else if (currentUser.role === 'mahasiswa') {
                        if (score !== null) {
                            qActions = `<span class="bg-green-100 text-green-800 px-3 py-1 rounded font-bold text-sm">Nilai: ${score}/100</span>`;
                        } else {
                            qActions = `<button onclick="takeQuiz('${quiz.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm shadow-sm"><i class="fas fa-pencil-alt mr-1"></i> Kerjakan Kuis</button>`;
                        }
                    }

                    html += `
                        <div class="bg-white rounded-lg border shadow-sm p-4 flex justify-between items-center">
                            <div><h4 class="font-bold text-gray-800">${quiz.title}</h4><p class="text-xs text-gray-500">${quiz.questions.length} Pertanyaan Pilihan Ganda</p></div>
                            <div class="flex items-center gap-2">${qActions}</div>
                        </div>`;
                });
            }
            html += `</div>`;

            return html;
        }

        // ==============================================================================
        // 12. FITUR KUIS (FORM EDITOR UNTUK DOSEN)
        // ==============================================================================
        function createNewQuiz() {
            currentQuizData = { id: 'q' + Date.now(), title: 'Kuis Baru', questions: [] };
            isEditingQuiz = true;
            renderContent();
        }

        function editQuiz(quizId) {
            const qz = selectedCourse.quizzes.find(q => q.id === quizId);
            currentQuizData = JSON.parse(JSON.stringify(qz)); 
            isEditingQuiz = true;
            renderContent();
        }

        function getQuizEditorHTML() {
            let html = `
                <div class="bg-white p-6 rounded-lg shadow border">
                    <h2 class="text-xl font-bold mb-4">Formulir Pembuatan Kuis</h2>
                    <div class="mb-6">
                        <label class="block text-sm font-medium mb-1">Judul Kuis</label>
                        <input type="text" id="quiz-title-input" value="${currentQuizData.title}" class="w-full p-2 border rounded focus:ring-1 focus:ring-purple-500" placeholder="Misal: Ujian Tengah Semester">
                    </div>
                    <div id="quiz-questions-container" class="space-y-6">
            `;

            if (currentQuizData.questions.length === 0) {
                html += `<div class="text-center p-6 text-gray-400 border-2 border-dashed rounded">Belum ada pertanyaan. Klik tombol di bawah untuk menambah.</div>`;
            } else {
                currentQuizData.questions.forEach((q, idx) => {
                    html += `
                    <div class="p-4 border border-gray-200 rounded bg-gray-50 relative">
                        <button onclick="removeQuestion(${idx})" class="absolute top-2 right-2 text-red-500 hover:text-red-700" title="Hapus Soal"><i class="fas fa-times"></i></button>
                        <label class="font-semibold text-sm mb-2 block">Soal #${idx + 1}</label>
                        <input type="text" id="q-text-${idx}" value="${q.q}" class="w-full p-2 border rounded mb-3" placeholder="Masukkan pertanyaan...">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${[0,1,2,3].map(optIdx => `
                                <div class="flex items-center bg-white p-2 border rounded">
                                    <input type="radio" name="q-ans-${idx}" value="${optIdx}" ${q.answer === optIdx ? 'checked' : ''} class="mr-2">
                                    <input type="text" id="q-opt-${idx}-${optIdx}" value="${q.options[optIdx] || ''}" class="w-full text-sm outline-none" placeholder="Opsi ${String.fromCharCode(65+optIdx)}">
                                </div>
                            `).join('')}
                        </div>
                        <p class="text-xs text-gray-500 mt-2">* Pilih radio button pada opsi yang merupakan jawaban benar.</p>
                    </div>`;
                });
            }

            html += `
                    </div>
                    <div class="mt-6 flex flex-wrap gap-2">
                        <button onclick="addQuestion()" class="bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300 text-sm"><i class="fas fa-plus mr-1"></i> Tambah Pertanyaan</button>
                        <button onclick="saveQuizData()" class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700 text-sm shadow"><i class="fas fa-save mr-1"></i> Simpan Kuis</button>
                        <button onclick="isEditingQuiz=false; renderContent();" class="border px-4 py-2 rounded hover:bg-gray-50 text-sm">Batal</button>
                    </div>
                </div>
            `;
            return html;
        }

        function addQuestion() {
            syncQuizInputs(); 
            currentQuizData.questions.push({ q: '', options: ['','','',''], answer: 0 });
            renderContent();
        }

        function removeQuestion(idx) {
            syncQuizInputs();
            currentQuizData.questions.splice(idx, 1);
            renderContent();
        }

        function syncQuizInputs() {
            currentQuizData.title = document.getElementById('quiz-title-input').value;
            currentQuizData.questions.forEach((q, idx) => {
                const qEl = document.getElementById(`q-text-${idx}`);
                if (qEl) {
                    q.q = qEl.value;
                    for (let i=0; i<4; i++) { q.options[i] = document.getElementById(`q-opt-${idx}-${i}`).value; }
                    const ansEl = document.querySelector(`input[name="q-ans-${idx}"]:checked`);
                    if (ansEl) q.answer = parseInt(ansEl.value);
                }
            });
        }

        function saveQuizData() {
            syncQuizInputs();
            if (!selectedCourse.quizzes) selectedCourse.quizzes = [];
            const idx = selectedCourse.quizzes.findIndex(q => q.id === currentQuizData.id);
            if (idx >= 0) selectedCourse.quizzes[idx] = currentQuizData;
            else selectedCourse.quizzes.push(currentQuizData);
            
            isEditingQuiz = false;
            renderContent();
        }

        function deleteQuiz(quizId) {
            if(confirm('Hapus kuis ini? Semua data nilai mahasiswa untuk kuis ini juga akan hilang.')) {
                selectedCourse.quizzes = selectedCourse.quizzes.filter(q => q.id !== quizId);
                renderContent();
            }
        }

        // ==============================================================================
        // 13. FITUR MAHASISWA MENGERJAKAN KUIS
        // ==============================================================================
        function takeQuiz(quizId) {
            takingQuizId = quizId;
            renderContent();
        }

        function getQuizTakerHTML() {
            const quiz = selectedCourse.quizzes.find(q => q.id === takingQuizId);
            let html = `
                <div class="bg-white p-6 md:p-8 rounded-lg shadow-lg border max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold mb-2">${quiz.title}</h2>
                    <p class="text-sm text-gray-500 mb-6 border-b pb-4">Mata Kuliah: ${selectedCourse.title} <br> Pastikan koneksi stabil. Jangan refresh halaman saat mengerjakan.</p>
                    <form id="quiz-take-form" class="space-y-6">
            `;

            quiz.questions.forEach((q, idx) => {
                html += `
                    <div class="mb-4">
                        <p class="font-medium text-gray-800 mb-3">${idx + 1}. ${q.q}</p>
                        <div class="space-y-2 pl-4">
                            ${q.options.map((opt, optIdx) => `
                                <label class="flex items-center cursor-pointer p-2 rounded hover:bg-green-50 border border-transparent hover:border-green-200 transition">
                                    <input type="radio" name="take-ans-${idx}" value="${optIdx}" class="mr-3" required>
                                    <span class="text-sm">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            html += `
                        <div class="pt-6 border-t flex gap-3">
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 shadow font-semibold">Kirim Jawaban</button>
                            <button type="button" onclick="takingQuizId=null; renderContent();" class="border px-4 py-2 rounded hover:bg-gray-50">Batal (Kembali)</button>
                        </div>
                    </form>
                </div>
            `;

            setTimeout(() => {
                document.getElementById('quiz-take-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    let correctCount = 0;
                    quiz.questions.forEach((q, idx) => {
                        const ansEl = document.querySelector(`input[name="take-ans-${idx}"]:checked`);
                        if (ansEl && parseInt(ansEl.value) === q.answer) {
                            correctCount++;
                        }
                    });
                    
                    const score = Math.round((correctCount / quiz.questions.length) * 100);
                    if (!selectedCourse.quizScores) selectedCourse.quizScores = {};
                    if (!selectedCourse.quizScores[quiz.id]) selectedCourse.quizScores[quiz.id] = {};
                    
                    selectedCourse.quizScores[quiz.id][currentUser.id] = score;
                    
                    alert(`Kuis selesai! Nilai Anda: ${score}`);
                    takingQuizId = null;
                    renderContent();
                });
            }, 0);

            return html;
        }

        // ==============================================================================
        // 14. FUNGSI LOGIKA EVENT LAINNYA & INISIALISASI
        // ==============================================================================
        
        // --- Form Profil & Form Kelas ---
        function attachProfileEvents() {
            const form = document.getElementById('profile-form');
            if(form) form.addEventListener('submit', handleProfileSubmit);
        }

        function handleProfileSubmit(e) {
            e.preventDefault();
            if (currentUser.role === 'admin') {
                currentUser.name = document.getElementById('p-name').value;
            } else {
                const emailVal = document.getElementById('p-email').value;
                if (currentUser.role === 'mahasiswa' && emailVal && !emailVal.endsWith('@mhs.sriwigama.ac.id')) return alert('Email mahasiswa harus menggunakan domain @mhs.sriwigama.ac.id');
                else if (currentUser.role === 'dosen' && emailVal && !emailVal.endsWith('@sriwigama.ac.id')) return alert('Email dosen harus menggunakan domain @sriwigama.ac.id');
                currentUser.email = emailVal;
                currentUser.phone = document.getElementById('p-phone').value;
            }

            const newPass = document.getElementById('p-pass').value;
            if(newPass && newPass.trim() !== '') currentUser.password = newPass;
            
            const idx = users.findIndex(u => u.id === currentUser.id);
            if(idx !== -1) users[idx] = currentUser;

            addLog('Mengubah data profil', currentUser);
            profileSuccessMsg = 'Profil berhasil diperbarui!';
            renderMainLayout(); 
        }

        // --- Simulasi Import Excel ---
        window.simulateExcelImport = function(inputElement) {
            if(inputElement.files.length > 0) {
                const fileName = inputElement.files[0].name;
                inputElement.value = ''; 
                setTimeout(() => {
                    alert(`Berhasil! Data dari file "${fileName}" berhasil diimpor.`);
                    renderContent();
                }, 800);
            }
        };

        // --- Export ke Excel ---
        window.exportToExcel = function() {
            if (typeof XLSX !== 'undefined') {
                const dataToExport = users.map(u => ({
                    'ID Pengguna / NIP / NIM': u.id,
                    'Username': u.username,
                    'Peran': u.role.toUpperCase(),
                    'Nama Lengkap': u.name,
                    'Email': u.email || '-',
                    'Nomor Telepon': u.phone || '-',
                    'Departemen / Program Studi': u.department || u.major || '-',
                    'Semester': u.semester || '-'
                }));

                const worksheet = XLSX.utils.json_to_sheet(dataToExport);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Data Pengguna");
                XLSX.writeFile(workbook, "Data_Pengguna_STIPER.xlsx");
                addLog('Melakukan Export Data Excel', currentUser);
            } else {
                alert('Library Excel belum termuat, silakan periksa koneksi internet Anda.');
            }
        };

        function attachManageUsersEvents() {
            const form = document.getElementById('admin-user-form');
            if(form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const isNew = adminEditingUser === 'NEW';
                    const role = document.getElementById('au-role').value;
                    const name = document.getElementById('au-name').value;
                    
                    let targetUser;
                    if (isNew) {
                        const uname = document.getElementById('au-user').value;
                        if(users.some(x => x.username === uname)) return alert('Username sudah dipakai!');
                        // Membuat ID random khusus dummy import. Normalnya disesuaikan form NIM/NIP.
                        const newId = 'new' + Date.now(); 
                        targetUser = { id: newId, username: uname, password: 'password123', role: role, name: name, nip: newId, firstAccess: '-', lastAccess: '-' };
                        users.push(targetUser);
                    } else {
                        targetUser = users.find(u => u.id === adminEditingUser);
                        targetUser.role = role;
                        targetUser.name = name;
                    }
                    
                    if(role === 'mahasiswa') {
                        targetUser.nip = document.getElementById('au-nip').value;
                        targetUser.id = targetUser.nip;
                        targetUser.major = document.getElementById('au-dep').value;
                        targetUser.semester = document.getElementById('au-sem').value;
                        delete targetUser.department;
                    } else if (role === 'dosen') {
                        targetUser.nip = document.getElementById('au-nip').value;
                        targetUser.id = targetUser.nip;
                        targetUser.department = document.getElementById('au-dep').value;
                        delete targetUser.major;
                        delete targetUser.semester;
                    }

                    if(!isNew && currentUser.id === adminEditingUser) currentUser = targetUser;
                    
                    adminEditingUser = null;
                    alert(isNew ? 'Pengguna baru berhasil ditambahkan.' : 'Data pengguna diperbarui.');
                    renderMainLayout(); 
                });
            }
        }

        // ==============================================================================
        // 15. GLOBAL ACTIONS 
        // ==============================================================================
        window.toggleSidebar = function() { isSidebarOpen = !isSidebarOpen; renderMainLayout(); };
        window.changeTab = function(tab) { activeTab = tab; selectedCourse = null; editingModule = null; dosenEditingCourse = null; adminEditingUser = null; adminResettingUser = null; takingQuizId = null; isEditingQuiz = false; renderContent(); renderSidebarMenu(); };
        window.logout = function() { addLog('Logout dari sistem', currentUser); currentUser = null; render(); };
        window.enrollCourse = function(cId) { const c = courses.find(x => x.id === cId); if(c && !c.enrolled.includes(currentUser.id)) { c.enrolled.push(currentUser.id); renderContent(); } };
        window.openCourse = function(cId) { selectedCourse = courses.find(x => x.id === cId); renderContent(); };
        window.closeCourse = function() { selectedCourse = null; editingModule = null; takingQuizId = null; isEditingQuiz = false; renderContent(); };

        // Admin Reset Password
        function attachResetPasswordEvents() {
            const form = document.getElementById('admin-reset-form');
            if(form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const newPass = document.getElementById('ar-pass').value;
                    const u = users.find(x => x.id === adminResettingUser);
                    if(u) { u.password = newPass; addLog('Mereset password pengguna: ' + u.name, currentUser); }
                    adminResettingUser = null;
                    alert('Password pengguna berhasil direset.');
                    renderMainLayout();
                });
            }
        }
        window.deleteUser = function(uId) { if(uId !== currentUser.id && confirm('Hapus pengguna ini?')) { users = users.filter(u => u.id !== uId); renderContent(); } };

        // Form Dosen Kelas
        function getDosenCourseFormHTML() {
            const isNew = dosenEditingCourse === 'NEW';
            const c = isNew ? { title: '', department: currentUser.department || '' } : courses.find(x => x.id === dosenEditingCourse);
            return `<div class="bg-white p-6 rounded-lg shadow"><h2 class="text-xl font-bold mb-4">${isNew ? 'Tambah Kelas' : 'Edit Kelas'}</h2>
                    <input type="text" id="dc-title" value="${c.title}" class="w-full p-2 border rounded mb-3" placeholder="Nama Mata Kuliah">
                    <button onclick="saveCourseForm('${isNew}')" class="bg-green-600 text-white px-4 py-2 rounded">Simpan</button>
                    <button onclick="dosenEditingCourse=null; renderContent();" class="border px-4 py-2 rounded">Batal</button></div>`;
        }
        window.saveCourseForm = function(isNewStr) {
            const title = document.getElementById('dc-title').value;
            if(isNewStr === 'true') courses.push({ id: 'c' + Date.now(), title: title, lecturerId: currentUser.id, department: currentUser.department, enrolled: [], modules: [], quizzes: [], quizScores: {} });
            else { const c = courses.find(x => x.id === dosenEditingCourse); if(c) c.title = title; }
            dosenEditingCourse = null; renderContent();
        };

        // Modul/File
        window.addModule = function() { selectedCourse.modules.push({ id: `m${Date.now()}`, title: 'Materi Baru', content: '' }); renderContent(); };
        window.saveModule = function(mId) {
            const mod = selectedCourse.modules.find(m => m.id === mId);
            if(mod) { mod.title = document.getElementById('edit-mod-title').value; mod.content = document.getElementById('edit-mod-content').value; }
            editingModule = null; renderContent();
        };
        window.deleteModule = function(mId) { selectedCourse.modules = selectedCourse.modules.filter(m => m.id !== mId); renderContent(); };

        function updateAdminFormFields(role, userObj = {}) {
            const container = document.getElementById('dynamic-fields');
            if(!container) return;
            const u = userObj.id ? userObj : (adminEditingUser !== 'NEW' ? users.find(x => x.id === adminEditingUser) : {});
            if(role === 'mahasiswa') container.innerHTML = `<div><label class="text-sm">NIM (ID)</label><input type="text" id="au-nip" value="${u.nip||''}" class="w-full p-2 border rounded"></div><div><label class="text-sm">Jurusan</label><input type="text" id="au-dep" value="${u.major||''}" class="w-full p-2 border rounded"></div><div><label class="text-sm">Semester</label><input type="number" id="au-sem" value="${u.semester||''}" class="w-full p-2 border rounded"></div>`;
            else if (role === 'dosen') container.innerHTML = `<div><label class="text-sm">NIP (ID)</label><input type="text" id="au-nip" value="${u.nip||''}" class="w-full p-2 border rounded"></div><div><label class="text-sm">Departemen</label><input type="text" id="au-dep" value="${u.department||''}" class="w-full p-2 border rounded"></div>`;
            else container.innerHTML = '';
        }

        function initClock() {
            clockInterval = setInterval(() => {
                const el = document.getElementById('live-clock');
                if(el) el.textContent = getFormattedTime();
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
