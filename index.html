    <!-- Custom Dialog Modal Info -->

            <div class="flex items-center gap-3 text-green-700 mb-4">

                </div>

                </div>

            </div>
            <p id="confirm-modal-message" class="text-sm text-gray-600 mb-6 leading-relaxed">Pertanyaan...</p>
            <div class="flex gap-3 justify-end">
                <button id="confirm-modal-cancel" class="px-4 py-2.5 border rounded-lg text-sm text-gray-600 hover:bg-gray-50 font-semibold transition">Batal</button>
                <button id="confirm-modal-ok" class="px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition">Ya, Lanjutkan</button>

            { id: '198001012005011001', username: 'dosen1', password: 'password', role: 'dosen', name: 'Dr. Budi Santoso', department: 'Agribisnis', nip: '198001012005011001', email: 'budi.santoso@sriwigama.ac.id', phone: '081298765432', address: 'Jl. Merdeka No. 1, Palembang', gender: 'Laki-laki', firstAccess: 'Rabu, 3 Juni 2026 09:15:00 WIB', lastAccess: 'Senin, 22 Juni 2026 15:17:10 WIB' },
            { id: '2021001', username: 'mhs1', password: 'password', role: 'mahasiswa', name: 'Andi Saputra', major: 'Agribisnis', semester: 3, nip: '2021001', email: 'andi@mhs.sriwigama.ac.id', phone: '085712345678', address: 'Jl. Mawar No. 3, Palembang', gender: 'Laki-laki', firstAccess: 'Senin, 8 Juni 2026 11:20:00 WIB', lastAccess: 'Senin, 22 Juni 2026 15:17:35 WIB' },
            { id: '2021002', username: 'mhs2', password: 'password', role: 'mahasiswa', name: 'Siti Rahma', major: 'Agroteknologi', semester: 3, nip: '2021002', email: 'siti.rahma@mhs.sriwigama.ac.id', phone: '081298887766', address: 'Jl. Melati No. 10, Palembang', gender: 'Perempuan', firstAccess: 'Selasa, 9 Juni 2026 10:15:00 WIB', lastAccess: 'Senin, 22 Juni 2026 14:10:00 WIB' },
            { id: '2021003', username: 'mhs3', password: 'password', role: 'mahasiswa', name: 'Rian Hidayat', major: 'Agroteknologi', semester: 1, nip: '2021003', email: 'rian@mhs.sriwigama.ac.id', phone: '089988776655', address: 'Jl. Kenanga No. 4, Palembang', gender: 'Laki-laki', firstAccess: 'Rabu, 10 Juni 2026 14:00:00 WIB', lastAccess: '-' }
        ];

        let courses = [

                modules: [
                    { id: 'm1', title: 'Modul 1: Sejarah Pertanian', content: 'Pertanian dimulai sejak zaman prasejarah ketika manusia mulai menetap dan bercocok tanam secara teratur. Perkembangan ini mengubah peradaban manusia dari pemburu pengumpul menjadi produsen pangan mandiri.', fileName: 'Modul_Sejarah.pdf', fileType: 'application/pdf', fileUrl: '#' }
                ],
                quizzes: [
                    { id: 'q1', title: 'Kuis Evaluasi Modul 1', questions: [
                        { q: 'Tanaman pangan apa yang menjadi komoditas rawa pasang surut?', options: ['Gandum', 'Padi', 'Kurma', 'Apel'], answer: 1 }
                    ]}
                ], 
                quizScores: {} 
            },
            {
                id: 'c2', title: 'Dasar-dasar Agronomi', lecturerId: '198001012005011001', department: 'Agroteknologi', enrolled: ['2021001'], modules: [], quizzes: [], quizScores: {}
            }
        ];

        let systemLogs = [
            { time: 'Senin, 22 Juni 2026 pukul 15:16:45 WIB', role: 'admin', user: 'Administrator', action: 'Login ke sistem' }
        ];
        
        let currentUser = null;
        let activeTab = 'dashboard';
        let selectedCourse = null;
        let isSidebarOpen = true;

        // State UI & Editor
        let editingModule = null;
        let adminEditingUser = null; 
        let adminResettingUser = null;
        let dosenEditingCourse = null; // Bisa berupa ID kelas atau 'NEW'
        let logFilterRole = 'all';
        let manageUserFilter = 'all';
        let clockInterval = null;
        let activeDetailedModule = null;

        // Status untuk Kuis & Upload Berkas Langsung
        let activeQuizEditId = null; 
        let activeQuizTakeId = null; 
        let quizFormState = { title: '', questions: [] };
        let quizTakerAnswers = {};
        let uploadProgress = null; 
        let activeModuleUploadId = null; 
        let globalUploadProgress = 0;

        const appContainer = document.getElementById('app-container');

        // ==============================================================================
        // 2. FUNGSI UTILITAS, NOTIFIKASI TOAST & DIALOG KUSTOM
        // ==============================================================================
        function getFormattedTime() {
            const now = new Date();
            const weekday = now.toLocaleDateString('id-ID', { weekday: 'long' });
            const day = now.getDate();
            const month = now.toLocaleDateString('id-ID', { month: 'long' });
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${weekday}, ${day} ${month} ${year} ${hours}:${minutes}:${seconds} WIB`;
        }

        function addLog(action, userObj) {
            const timeStr = getFormattedTime();
            systemLogs.unshift({ time: timeStr, role: userObj.role, user: userObj.name, action: action });
        }

        // Notification Toast Kustom
        window.showNotification = function(msg, type='success') {
            const container = document.createElement('div');
            container.className = `fixed bottom-5 right-5 z-[9999] p-4 rounded-xl shadow-2xl border flex items-center gap-3 fade-in ${
                type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-green-50 border-green-200 text-green-800'
            }`;
            container.innerHTML = `
                <i class="fas ${type === 'error' ? 'fa-times-circle text-red-500' : 'fa-check-circle text-green-500'} text-lg"></i>
                <span class="text-sm font-semibold">${msg}</span>
            `;
            document.body.appendChild(container);
            setTimeout(() => {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.4s ease-out';
                setTimeout(() => container.remove(), 400);
            }, 3000);
        }

        // Dialog Konfirmasi Modal Kustom
        window.showConfirmModal = function(message, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const msgEl = document.getElementById('confirm-modal-message');
            const btnOk = document.getElementById('confirm-modal-ok');
            const btnCancel = document.getElementById('confirm-modal-cancel');

            msgEl.innerHTML = message;
            modal.classList.remove('hidden');

            btnCancel.onclick = () => {
                modal.classList.add('hidden');
            };

            btnOk.onclick = () => {
                onConfirm();
                modal.classList.add('hidden');
            };
        }

        // Dialog Alert Modal Kustom
        window.showAlertModal = function(message, title='Informasi') {
            const modal = document.getElementById('alert-modal');
            const titleEl = document.getElementById('alert-modal-title');
            const msgEl = document.getElementById('alert-modal-message');

            titleEl.innerText = title;
            msgEl.innerHTML = message;
            modal.classList.remove('hidden');
        }

        window.closeAlertModal = function() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        function render() {
            if (!currentUser) { 
                renderLogin(); 
            } else { 
                renderMainLayout(); 
            }
        }

        // ==============================================================================
        // 3. HALAMAN LOGIN
        // ==============================================================================
        function renderLogin() {
            appContainer.innerHTML = `
                <div class="min-h-screen bg-[#f0fdf4] flex items-center justify-center p-4">
                    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-4 border-green-700 fade-in">
                        <div class="flex flex-col items-center mb-6">
                            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-750 text-3xl mb-3 shadow-inner">
                                <i class="fas fa-graduation-cap text-[#0e5c32]"></i>
                            </div>
                            <h1 class="text-2xl font-black text-gray-800 text-center tracking-tight">STIPER SRIWIGAMA</h1>
                            <p class="text-gray-500 text-xs italic mt-0.5">Sistem Manajemen Pembelajaran & Akademik</p>
                        </div>
                        
                        <div id="login-error" class="hidden bg-red-100 text-red-600 p-3 rounded mb-4 text-sm text-center"></div>
                        
                        <form id="login-form" class="space-y-4">
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                                    <i class="fas fa-user-circle text-lg"></i>
                                </span>
                                <input type="text" id="username" class="w-full p-3.5 pl-11 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none border-gray-300 text-sm" placeholder="Username / NIP / NIM" required>
                            </div>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                                    <i class="fas fa-lock text-lg"></i>
                                </span>
                                <input type="password" id="password" class="w-full p-3.5 pl-11 pr-10 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none border-gray-300 text-sm" placeholder="Kata Sandi" required>
                                <button type="button" onclick="togglePass()" class="absolute right-3 top-4 text-gray-400 hover:text-green-600"><i id="eye" class="fas fa-eye"></i></button>
                            </div>
                            <button type="submit" class="w-full bg-[#0e5c32] hover:bg-[#094122] text-white font-bold py-3.5 rounded-lg shadow-md transition text-sm tracking-wide">MASUK</button>
                        </form>
                        
                        <div class="mt-5 bg-blue-50 border border-blue-100 p-4 rounded-xl text-xs flex items-start gap-3">
                            <i class="fas fa-info-circle text-base text-blue-600 mt-0.5 shrink-0 animate-pulse"></i>
                            <span class="text-blue-900 leading-relaxed font-medium">
                                Butuh bantuan akses? Silakan hubungi admin akademik atau pusat layanan kampus STIPER Sriwigama.
                            </span>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('login-form').onsubmit = (e) => {
                e.preventDefault();
                const uInput = document.getElementById('username').value.trim();
                const pInput = document.getElementById('password').value;
                const user = users.find(x => x.username === uInput || x.id === uInput);
                
                if (user && user.password === pInput) { 
                    currentUser = user; 
                    currentUser.lastAccess = getFormattedTime();
                    addLog('Login ke sistem', currentUser); 
                    showNotification('Selamat datang kembali!', 'success');
                    render(); 
                } else {
                    showNotification('ID Pengguna atau Kata Sandi salah!', 'error');
                }
            };
        }

        window.togglePass = () => {
            const p = document.getElementById('password');
            const e = document.getElementById('eye');
            p.type = p.type === 'password' ? 'text' : 'password';
            e.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        };

        // ==============================================================================
        // 4. KERANGKA UTAMA APLIKASI
        // ==============================================================================
        function renderMainLayout() {
            const sidebarClass = isSidebarOpen ? 'w-64 md:relative absolute z-40' : 'w-0 md:w-20 overflow-hidden';
            const userRoleLabel = currentUser.role === 'admin' ? 'Administrator' : (currentUser.role === 'dosen' ? 'Dosen' : 'Mahasiswa');

            appContainer.innerHTML = `
                <nav class="bg-[#0e5c32] text-white h-16 shrink-0 flex items-center justify-between px-4 md:px-8 shadow-lg border-b border-[#083c20]">
                    <div class="flex items-center space-x-4">
                        <button onclick="isSidebarOpen=!isSidebarOpen; render();" class="text-white hover:bg-[#094122] p-2 rounded-lg transition"><i class="fas fa-bars text-xl"></i></button>
                        <div class="hidden sm:block">
                            <h2 class="font-bold text-lg leading-none">E-LMS STIPER</h2>
                            <p id="live-clock" class="text-[11px] text-green-300 mt-1"></p>
                        </div>
                    </div>

                        <div class="text-right hidden md:block">
                            <p class="text-sm font-bold leading-tight">${currentUser.name}</p>
                            <p class="text-[10px] text-green-300 uppercase font-semibold">${userRoleLabel}</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('drop').classList.toggle('hidden')" class="bg-[#094122] p-2 px-3 rounded-lg border border-[#166534] flex items-center space-x-2 transition hover:bg-[#07311a]">
                                <i class="far fa-user text-sm"></i> <i class="fas fa-chevron-down text-[10px]"></i>
                            </button>
                            <div id="drop" class="absolute right-0 mt-2 w-48 bg-white text-gray-800 rounded-lg shadow-xl border border-gray-100 hidden z-50 overflow-hidden">
                                <button onclick="activeTab='profile'; document.getElementById('drop').classList.add('hidden'); render();" class="w-full text-left p-3 hover:bg-gray-50 flex items-center text-sm font-medium"><i class="far fa-user-circle mr-2 text-green-600"></i> Profil & Aktivitas</button>
                                <hr class="border-gray-100">
                                <button onclick="logout();" class="w-full text-left p-3 hover:bg-red-50 text-red-600 flex items-center text-sm font-semibold"><i class="fas fa-sign-out-alt mr-2 text-red-500"></i> Keluar</button>
                            </div>
                        </div>
                    </div>
                </nav>
                <div class="flex flex-grow overflow-hidden">
                    <aside class="${sidebarClass} bg-white border-r h-full transition-all duration-300 shadow-sm z-30 flex flex-col justify-between shrink-0">
                        <div class="p-3 space-y-2 mt-4" id="side-menu"></div>
                    </aside>
                    <main class="flex-grow overflow-y-auto p-4 md:p-8 no-scrollbar flex flex-col justify-between min-w-0" id="main-content-wrapper">
                        <div id="main-content" class="w-full flex-grow"></div>
                        
                        <!-- Footer Hak Cipta -->
                        <footer class="mt-12 pt-6 border-t border-gray-200 text-center text-xs text-gray-500 font-medium">
                            © 2026 Sekolah Tinggi Ilmu Pertanian (STIPER) SRIWIGAMA Palembang. Seluruh Hak Cipta Dilindungi.
                        </footer>
                    </main>
                </div>
                
                <!-- Modal Detail Modul -->
                <div id="modal-module-detail" class="fixed inset-0 bg-black/60 z-[9999] flex items-center justify-center p-4 fade-in hidden"></div>
                
                <!-- Modal Tambah/Edit Kelas (CRUD Admin & Dosen) -->
                <div id="modal-course-crud" class="fixed inset-0 bg-black/60 z-[9999] flex items-center justify-center p-4 fade-in hidden"></div>`;
                
            renderSideMenu();
            renderContent();
            startClock();
        }

        function renderSideMenu() {
            const menu = document.getElementById('side-menu');
            const items = [
                { id: 'dashboard', label: 'Beranda', icon: 'fa-home' },
                { id: 'courses', label: 'Mata Kuliah', icon: 'fa-book-open' }
            ];
            if(currentUser.role === 'mahasiswa') items.push({ id: 'reports', label: 'Laporan', icon: 'fa-chart-pie' });
            if(currentUser.role === 'admin') {
                items.push({ id: 'users', label: 'Kelola Pengguna', icon: 'fa-users-cog' });
                items.push({ id: 'system-logs', label: 'Log Sistem', icon: 'fa-list' });
            }

            menu.innerHTML = items.map(i => {
                const isActive = activeTab === i.id;
                // Sidebar active styling is precise, modern, and flexible
                const activeStyle = isActive 
                    ? 'bg-emerald-50 text-emerald-800 font-bold border-l-4 border-emerald-600 shadow-sm shadow-emerald-50/50' 
                    : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800 border-l-4 border-transparent';
                
                return `
                    <button onclick="activeTab='${i.id}'; selectedCourse=null; render();" class="w-full flex items-center p-3 rounded-r-xl transition-all duration-200 ${activeStyle}">
                        <i class="fas ${i.icon} w-6 text-lg"></i> 
                        <span class="${isSidebarOpen ? 'block' : 'hidden'} ml-3 whitespace-nowrap text-sm">${i.label}</span>
                    </button>`;
            }).join('');
        }

        function startClock() {
            const el = document.getElementById('live-clock');
            if(el) el.innerText = getFormattedTime();
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => { if(el) el.innerText = getFormattedTime(); }, 1000);
        }

        function logout() {
            addLog('Logout dari sistem', currentUser);
            currentUser = null;
            render();
        }

        // ==============================================================================
        // 5. ROUTER UTAMA
        // ==============================================================================
        function renderContent() {
            const main = document.getElementById('main-content');
            if (activeTab === 'dashboard') {
                renderDashboard(main);
            } 
            else if (activeTab === 'courses' && !selectedCourse) {
                renderCourseList(main);
            } 
            else if (selectedCourse) {
                renderCourseDetail(main);
            } 
            else if (activeTab === 'users' && currentUser.role === 'admin') {
                renderManageUsers(main);
            }
            else if (activeTab === 'profile') {
                renderProfile(main);
            }
            else if (activeTab === 'reports' && currentUser.role === 'mahasiswa') {
                main.innerHTML = getReportsHTML();
            }
            else if (activeTab === 'system-logs' && currentUser.role === 'admin') {
                main.innerHTML = getSystemLogsHTML();
                initClock();
            }
        }

        // ==============================================================================

        // ==============================================================================
        function renderDashboard(container) {
            const totalMateri = courses.reduce((acc, curr) => acc + (curr.modules ? curr.modules.length : 0), 0);

            container.innerHTML = `
                <div class="max-w-4xl fade-in">
                    <h1 class="text-2xl font-black text-gray-800">Selamat Datang, <span class="text-[#0e5c32]">${currentUser.name}</span></h1>
                    <p class="text-gray-500 mt-2 text-sm leading-relaxed">Portal Sistem Informasi Manajemen Akademik & E-Learning Sekolah Tinggi Ilmu Pertanian (STIPER) Sriwigama Palembang.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-4 bg-purple-50 text-purple-600 rounded-xl"><i class="fas fa-users text-3xl"></i></div>
                            <div>
                                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pengguna</h3>
                                <p class="text-2xl font-black text-gray-800">${users.length}</p>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-4 bg-green-50 text-[#0e5c32] rounded-xl"><i class="fas fa-chalkboard-teacher text-3xl"></i></div>
                            <div>
                                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Mata Kuliah</h3>
                                <p class="text-2xl font-black text-gray-800">${courses.length}</p>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-4 bg-blue-50 text-blue-600 rounded-xl"><i class="fas fa-file-alt text-3xl"></i></div>
                            <div>
                                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Berkas Materi</h3>
                                <p class="text-2xl font-black text-gray-800">${totalMateri}</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-yellow-50 border border-yellow-100 p-6 rounded-2xl mt-8">
                        <h4 class="font-bold text-yellow-800 flex items-center gap-2 text-sm"><i class="fas fa-bullhorn text-lg"></i> Petunjuk Pengoperasian Portal</h4>
                        <p class="text-xs text-yellow-700 leading-relaxed mt-2">Dosen pengampu & Administrator dapat mengelola materi kuliah secara langsung di halaman detail mata kuliah. Mahasiswa dapat melihat daftar tugas, kuis aktif, mengunduh file, serta melihat rekap nilai pengerjaan kuis pada tab Laporan.</p>
                    </div>
                </div>`;
        }

        // ==============================================================================
        // 7. PROFIL AKUN & RIWAYAT AKTIVITAS
        // ==============================================================================
        function renderProfile(container) {
            const isAdmin = currentUser.role === 'admin';
            const idLabel = currentUser.role === 'mahasiswa' ? 'NIM' : (currentUser.role === 'dosen' ? 'NIP' : 'NIP / ID');
            const depLabel = currentUser.role === 'mahasiswa' ? 'Program Studi' : 'Departemen / Divisi';

        window.handleProfileUpdate = function(e) {
            e.preventDefault();
            const email = document.getElementById('prof-email').value;
            const phone = document.getElementById('prof-phone').value;
            const address = document.getElementById('prof-address').value;
            const pass = document.getElementById('prof-password').value;

            currentUser.email = email;
            currentUser.phone = phone;
            currentUser.address = address;
            currentUser.name = document.getElementById('prof-name').value;

            if (currentUser.role !== 'admin') {
                currentUser.gender = document.getElementById('prof-gender').value;
            }

            if(pass.trim() !== '') {
                currentUser.password = pass;
            }

            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) users[idx] = currentUser;

            addLog('Mengubah data profil akun', currentUser);
            showNotification('Profil Anda berhasil diperbarui!', 'success');
            render();
        };

        function renderPersonalLogs() {
            const tbody = document.getElementById('personal-login-tbody');
            if(!tbody) return;
            tbody.innerHTML = '';

            const logs = systemLogs.filter(l => l.role === 'admin'); // Tampilkan aktivitas admin
            if(logs.length === 0) {
                tbody.innerHTML = `<tr><td class="p-3 text-center text-gray-400">Belum ada riwayat otentikasi.</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(l => `
                <tr class="hover:bg-gray-50">
                    <td class="p-2.5 font-semibold text-gray-700 leading-tight">${l.time}<br><span class="text-[9px] text-gray-400">${l.user}</span></td>
                    <td class="p-2.5 text-right text-green-600 font-bold">${l.action}</td>
                </tr>`).join('');
        }

            topBar += `</div>`;

            let html = topBar + '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">';
            
            courses.forEach(course => {
                const isEnrolled = course.enrolled.includes(currentUser.id);
                const isMyCourse = course.lecturerId === currentUser.id;
                
                // Jika Dosen, hanya tampilkan kelas miliknya
                if (isDosen && !isMyCourse) return;
                
                const lecturer = users.find(u => u.id === course.lecturerId);
                const totalMateri = course.modules ? course.modules.length : 0;
                const totalKuis = course.quizzes ? course.quizzes.length : 0;
                
                let btnHtml = '';
                if (currentUser.role === 'mahasiswa' && !isEnrolled) {
                    btnHtml = `<button onclick="event.stopPropagation(); enrollCourse('${course.id}')" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-bold transition shrink-0">Ikuti Kelas</button>`;
                } else {
                    const btnText = (isDosen || isAdmin) ? 'Kelola Kelas' : 'Masuk Kelas';
                    btnHtml = `<button onclick="openCourse('${course.id}')" class="text-xs bg-green-50 text-green-700 hover:bg-green-100 px-4 py-2.5 rounded-xl font-bold flex items-center transition shrink-0">${btnText} <i class="fas fa-chevron-right ml-2 text-[10px]"></i></button>`;

                // Pengelolaan Mata Kuliah (Dosen Milik Sendiri ATAU Admin Penuh)
                let managementActions = '';
                if ((isDosen && isMyCourse) || isAdmin) {
                    managementActions = `
                        <div class="absolute top-2 right-2 flex space-x-1 z-10">
                            <button onclick="event.stopPropagation(); triggerEditCourse('${course.id}');" class="bg-white/90 text-blue-600 p-2 rounded shadow hover:bg-white text-xs"><i class="fas fa-edit"></i></button>

                        </div>`;
                }

                html += `
                    <div onclick="openCourse('${course.id}')" class="bg-white rounded-2xl border border-gray-150 overflow-hidden relative group transition hover:shadow-md cursor-pointer flex flex-col justify-between">
                        ${managementActions}
                        ${isAdmin ? `<div class="absolute top-2 left-2 bg-purple-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-lg shadow-sm z-10">AKSES ADMIN</div>` : ''}
                        
                        <div>

                                <i class="fas fa-chalkboard text-4xl text-white opacity-40"></i>

            showConfirmModal('Apakah Anda yakin ingin menghapus kelas ini beserta seluruh materi, kuis, dan data peserta secara permanen?', () => {
                courses = courses.filter(c => c.id !== courseId);
                showNotification('Mata kuliah berhasil dihapus dari sistem.', 'success');
                render();
            });

                                <option value="Agroteknologi" ${course.department === 'Agroteknologi' ? 'selected' : ''}>Agroteknologi</option>
                            </select>

                        ${lecturerSelection}

                            <button type="button" onclick="closeCourseCrudModal()" class="px-4 py-2 border rounded-lg text-sm font-semibold hover:bg-gray-50 transition">Batal</button>

                        </div>
                    </form>
                </div>`;
            modal.classList.remove('hidden');
        }

        window.closeCourseCrudModal = function() {
            document.getElementById('modal-course-crud').classList.add('hidden');
        }

        window.saveCourseCrud = function(e, mode) {
            e.preventDefault();
            const title = document.getElementById('modal-c-title').value;
            const dept = document.getElementById('modal-c-dept').value;
            const lecturerId = document.getElementById('modal-c-lecturer').value;

            if (mode === 'NEW') {
                const newCourse = {
                    id: 'c' + Date.now(),
                    title: title,
                    lecturerId: lecturerId,
                    department: dept,
                    enrolled: [],
                    modules: [],
                    quizzes: [],
                    quizScores: {}
                };
                courses.push(newCourse);
                addLog(`Membuat kelas baru: ${title}`, currentUser);
                showNotification('Kelas baru berhasil diterbitkan!', 'success');
            } else {
                const course = courses.find(c => c.id === mode);
                if (course) {
                    course.title = title;
                    course.department = dept;
                    course.lecturerId = lecturerId;
                    addLog(`Mengubah detail kelas: ${title}`, currentUser);
                    showNotification('Pembaruan data kelas berhasil disimpan!', 'success');
                }
            }
            closeCourseCrudModal();
            render();
        }

        window.handleAdminSaveUser = function(e, isNewStr) {
            e.preventDefault();
            const isNew = isNewStr === 'true';
            const role = document.getElementById('au-role').value;
            const name = document.getElementById('au-name').value;
            const idVal = document.getElementById('au-id').value.trim();
            const usernameVal = document.getElementById('au-user').value.trim();

            if (isNew) {
                if(users.some(x => x.id === idVal)) {
                    showNotification('ID Pengguna (NIP/NIM) sudah digunakan!', 'error');
                    return;
                }
                if(users.some(x => x.username === usernameVal)) {
                    showNotification('Username sudah digunakan!', 'error');
                    return;
                }
            }

            let targetUser;
            if (isNew) {
                targetUser = { id: idVal, username: usernameVal, password: 'password123', role: role, name: name, firstAccess: getFormattedTime(), lastAccess: '-' };
                users.push(targetUser);
            } else {
                targetUser = users.find(u => u.id === adminEditingUser);
                targetUser.name = name;
                targetUser.role = role;
            }

            if(role === 'mahasiswa') {
                targetUser.major = document.getElementById('au-dep').value;
                targetUser.semester = parseInt(document.getElementById('au-sem').value);
                delete targetUser.department;
            } else if (role === 'dosen') {
                targetUser.department = document.getElementById('au-dep').value;
                delete targetUser.major;
                delete targetUser.semester;
            }

            adminEditingUser = null;
            showNotification(isNew ? 'Pengguna baru berhasil ditambahkan!' : 'Data pengguna berhasil diperbarui!', 'success');
            render();
        }

        window.handleAdminDeleteUser = function(idVal) {
            if(idVal === currentUser.id) return;
            showConfirmModal('Apakah Anda yakin ingin menghapus pengguna ini secara permanen dari sistem E-LMS?', () => {
                users = users.filter(u => u.id !== idVal);
                showNotification('Pengguna berhasil dihapus.', 'success');
                render();
            });
        }

        window.handleAdminResetSubmit = function(e) {
            e.preventDefault();
            const newPass = document.getElementById('ar-pass').value;
            const fileInput = document.getElementById('ar-file');

            if(fileInput.files.length === 0) {
                showNotification('Formulir bukti fisik pengajuan wajib diunggah!', 'error');
                return;
            }

            const targetUser = users.find(u => u.id === adminResettingUser);
            if(targetUser) {
                targetUser.password = newPass;
                targetUser.resetFormUrl = URL.createObjectURL(fileInput.files[0]);
                targetUser.resetFormName = fileInput.files[0].name;
                addLog(`Reset sandi akun: ${targetUser.name}`, currentUser);
                showNotification('Sandi berhasil direset dan bukti tersimpan!', 'success');
            }

            adminResettingUser = null;
            render();
        }

        window.executeAdminMassDelete = function() {
            const role = document.getElementById('md-role-select').value;
            const major = document.getElementById('md-major-input').value.trim();
            const semester = document.getElementById('md-semester-input').value.trim();

            if(!role && !major && !semester) {
                showNotification('Pilih kriteria untuk melakukan penghapusan massal!', 'error');
                return;
            }

            let msg = 'Apakah Anda yakin ingin menghapus secara massal pengguna yang cocok dengan kriteria berikut?<br>';
            if(role) msg += `&bull; Peran: <strong>${role}</strong><br>`;
            if(major) msg += `&bull; Jurusan/Program Studi: <strong>${major}</strong><br>`;
            if(semester) msg += `&bull; Semester: <strong>${semester}</strong>`;

            showConfirmModal(msg, () => {
                const initLen = users.length;
                users = users.filter(u => {
                    if (u.id === currentUser.id) return true;

                    let match = true;
                    if (role && u.role !== role) match = false;
                    if (major && u.major !== major && u.department !== major) match = false;
                    if (semester && String(u.semester) !== semester) match = false;

                    return !match;
                });

                const deletedCount = initLen - users.length;
                showNotification(`Berhasil menghapus ${deletedCount} pengguna secara massal!`, 'success');
                render();
            });
        }

        window.exportUsersToExcel = function() {
            if (typeof XLSX !== 'undefined') {
                const data = users.map(u => ({
                    'ID Pengguna / NIP / NIM': u.id,
                    'Username': u.username,
                    'Peran / Role': u.role.toUpperCase(),

                    'Nomor Telepon': u.phone || '-',
                    'Semester': u.semester || '-',
                    'Jurusan / Program Studi': u.major || u.department || '-'
                }));

                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Pengguna E-LMS");
                XLSX.writeFile(wb, "Data_Pengguna_STIPER.xlsx");
                showNotification('Data pengguna berhasil diekspor ke Excel!', 'success');

                showNotification('Library ekspor gagal dimuat!', 'error');

                render();

        // ==============================================================================
        // 12. LOGIKA MATERI (DOSEN & ADMIN)
        // ==============================================================================
        window.handleDirectFileUpload = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                let percent = 0;
                uploadProgress = { fileName: file.name, percent: 0 };
                render();

                const interval = setInterval(() => {
                    percent += 10;
                    if (uploadProgress) {
                        uploadProgress.percent = percent;
                        render();
                    }

                    if (percent >= 100) {
                        clearInterval(interval);
                        const newModuleId = 'm' + Date.now();
                        const fileType = file.type || '';
                        
                        selectedCourse.modules.push({
                            id: newModuleId,
                            title: file.name.split('.')[0].replace(/_/g, ' ').replace(/-/g, ' '),
                            content: `Materi berbentuk berkas digital "${file.name}" berhasil diunggah langsung oleh pengampu.`,
                            fileName: file.name,
                            fileType: fileType,
                            fileUrl: URL.createObjectURL(file) 
                        });

                        uploadProgress = null;
                        render();
                        showNotification(`Berkas "${file.name}" berhasil diunggah dan diterbitkan.`, 'success');
                    }
                }, 100);
            }
        };

        window.uploadLocalFile = (input, modId) => {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                activeModuleUploadId = modId;
                globalUploadProgress = 0;
                render();

                const interval = setInterval(() => {
                    globalUploadProgress += 10;
                    render();
                    if (globalUploadProgress >= 100) {
                        clearInterval(interval);
                        const mod = selectedCourse.modules.find(m => m.id === modId);
                        mod.fileName = file.name;
                        mod.fileType = file.type;
                        mod.fileUrl = URL.createObjectURL(file);
                        activeModuleUploadId = null;
                        showNotification('Berkas lampiran berhasil dipasang!', 'success');
                        
                        if(activeDetailedModule && activeDetailedModule.id === modId) {
                            openDetailedModuleModal(modId);
                        } else {
                            render();
                        }
                    }
                }, 100);
            }
        };

        window.triggerUpdateFile = (modId) => {
            const tempInput = document.createElement('input');
            tempInput.type = 'file';
            tempInput.onchange = (e) => uploadLocalFile(e.target, modId);
            tempInput.click();
        };

        window.deleteFile = (modId) => {
            showConfirmModal('Apakah Anda ingin menghapus lampiran berkas ini?', () => {
                const mod = selectedCourse.modules.find(m => m.id === modId);
                mod.fileName = null;
                mod.fileUrl = null;
                mod.fileType = null;
                showNotification('Lampiran berhasil dihapus', 'success');
                
                if(activeDetailedModule && activeDetailedModule.id === modId) {
                    openDetailedModuleModal(modId);
                } else {
                    render();
                }
            });
        };

            selectedCourse.modules.push({
                id: 'm' + Date.now(),
                title: 'Materi Baru ' + (selectedCourse.modules.length + 1),
                content: 'Tuliskan isi modul pembelajaran Anda di sini.',

                fileType: null,
                fileUrl: null
            });
            render();
            showNotification('Materi baru berhasil ditambahkan!', 'success');
        };

        window.saveMod = (id) => {

            m.title = document.getElementById('e-title').value;

            const c = courses.find(x => x.id === cId); 
            if(c && !c.enrolled.includes(currentUser.id)) {

        // ==============================================================================

        window.createNewQuiz = function() {
            activeQuizEditId = 'NEW';
            quizFormState = {
                title: 'Kuis Evaluasi Baru',
                questions: [
                    { q: 'Tanaman pangan apa yang menjadi komoditas utama?', options: ['Gandum', 'Padi', 'Jagung', 'Apel'], answer: 1 }
                ]
            };
            render();
        };

        window.editQuiz = function(quizId) {
            const quiz = selectedCourse.quizzes.find(q => q.id === quizId);
            if (quiz) {
                activeQuizEditId = quizId;
                quizFormState = JSON.parse(JSON.stringify(quiz));
                render();
            }
        };

        window.deleteQuiz = function(quizId) {
            showConfirmModal('Apakah Anda yakin ingin menghapus kuis ini secara permanen dari kelas?', () => {
                selectedCourse.quizzes = selectedCourse.quizzes.filter(q => q.id !== quizId);
                if (selectedCourse.quizScores && selectedCourse.quizScores[quizId]) {
                    delete selectedCourse.quizScores[quizId];
                }
                showNotification('Kuis berhasil dihapus.', 'success');
                render();
            });
        };

        window.takeQuiz = function(quizId) {
            activeQuizTakeId = quizId;
            quizTakerAnswers = {};
            render();
        };

        window.syncQuizFormState = function() {
            const titleInput = document.getElementById('quiz-title-input');
            if (titleInput) {
                quizFormState.title = titleInput.value;
            }
            
            quizFormState.questions.forEach((question, qIdx) => {
                const qInput = document.getElementById(`q-text-${qIdx}`);
                if (qInput) question.q = qInput.value;
                
                question.options.forEach((opt, optIdx) => {
                    const optInput = document.getElementById(`q-${qIdx}-opt-${optIdx}`);
                    if (optInput) question.options[optIdx] = optInput.value;
                });
                
                const ansSelect = document.getElementById(`q-${qIdx}-ans`);
                if (ansSelect) question.answer = parseInt(ansSelect.value);
            });
        };

        window.addQuizQuestion = function() {
            syncQuizFormState();
            quizFormState.questions.push({ q: '', options: ['', '', '', ''], answer: 0 });
            render();
        };

        window.removeQuizQuestion = function(qIdx) {
            syncQuizFormState();
            if (quizFormState.questions.length > 1) {
                quizFormState.questions.splice(qIdx, 1);
                render();
            } else {
                showNotification('Minimal harus terdapat 1 pertanyaan di dalam kuis!', 'error');
            }
        };

        window.saveQuiz = function() {
            syncQuizFormState();
            
            if (!quizFormState.title.trim()) {
                showNotification('Judul kuis tidak boleh kosong!', 'error');
                return;
            }
            
            for (let i = 0; i < quizFormState.questions.length; i++) {
                const q = quizFormState.questions[i];
                if (!q.q.trim()) {
                    showNotification(`Pertanyaan #${i+1} tidak boleh kosong!`, 'error');
                    return;
                }
                for (let j = 0; j < q.options.length; j++) {
                    if (!q.options[j].trim()) {
                        showNotification(`Pilihan ${j+1} pada Pertanyaan #${i+1} tidak boleh kosong!`, 'error');
                        return;
                    }
                }
            }

            if (activeQuizEditId === 'NEW') {
                const newQuizId = 'q' + Date.now();
                const newQuiz = {
                    id: newQuizId,
                    title: quizFormState.title,
                    questions: quizFormState.questions
                };
                if (!selectedCourse.quizzes) selectedCourse.quizzes = [];
                selectedCourse.quizzes.push(newQuiz);
                if (!selectedCourse.quizScores) selectedCourse.quizScores = {};
                selectedCourse.quizScores[newQuizId] = {};
                showNotification('Kuis baru berhasil diterbitkan!', 'success');
            } else {
                const quiz = selectedCourse.quizzes.find(q => q.id === activeQuizEditId);
                if (quiz) {
                    quiz.title = quizFormState.title;
                    quiz.questions = quizFormState.questions;
                    showNotification('Perubahan kuis berhasil disimpan!', 'success');
                }
            }
            
            activeQuizEditId = null;
            render();
        };

        window.cancelQuizEdit = function() {
            activeQuizEditId = null;
            render();
        };

        window.setQuizAnswer = function(qIdx, optIdx) {
            quizTakerAnswers[qIdx] = optIdx;
            quizFormState.questions.forEach((_, idx) => {
                const card = document.getElementById(`q-${qIdx}-optcard-${idx}`);
                if (card) {
                    if (idx === optIdx) {
                        card.className = "p-4 rounded-xl border-2 border-green-600 bg-green-50 text-green-900 font-semibold cursor-pointer transition";
                    } else {
                        card.className = "p-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 cursor-pointer transition";
                    }
                }
            });
        };

        window.submitQuizAnswers = function() {
            const quiz = selectedCourse.quizzes.find(q => q.id === activeQuizTakeId);
            if (!quiz) return;

            if (Object.keys(quizTakerAnswers).length < quiz.questions.length) {
                showNotification('Harap menjawab semua pertanyaan sebelum mengumpulkan kuis!', 'error');
                return;
            }

            let correctCount = 0;
            quiz.questions.forEach((q, idx) => {
                if (quizTakerAnswers[idx] === q.answer) {
                    correctCount++;
                }
            });

            const finalScore = Math.round((correctCount / quiz.questions.length) * 100);
            
            if (!selectedCourse.quizScores) selectedCourse.quizScores = {};
            if (!selectedCourse.quizScores[activeQuizTakeId]) selectedCourse.quizScores[activeQuizTakeId] = {};
            
            selectedCourse.quizScores[activeQuizTakeId][currentUser.id] = finalScore;
            
            addLog(`Mengerjakan kuis "${quiz.title}" dengan hasil ${finalScore}/100`, currentUser);
            showAlertModal(`Lembar jawaban Anda telah diterima.<br><br>Hasil Anda: <strong class="text-2xl text-green-700">${finalScore} / 100</strong><br>Berhasil menjawab: <strong>${correctCount}</strong> dari ${quiz.questions.length} soal.`, 'Kuis Selesai');
            
            activeQuizTakeId = null;
            render();
        };

        window.cancelQuizTake = function() {
            showConfirmModal('Apakah Anda yakin ingin membatalkan kuis? Seluruh lembar jawaban Anda saat ini akan dihapus.', () => {
                activeQuizTakeId = null;
                render();
            });
        };

        }

        function renderQuizTaker(container) {
            const quiz = selectedCourse.quizzes.find(q => q.id === activeQuizTakeId);
            if (!quiz) return;

            let questionsHtml = quiz.questions.map((q, qIdx) => `
                <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                    <p class="text-xs font-bold text-green-700 uppercase tracking-widest">Pertanyaan #${qIdx + 1} dari ${quiz.questions.length}</p>
                    <h4 class="font-bold text-gray-855 text-base leading-relaxed">${q.q}</h4>
                    <div class="grid grid-cols-1 gap-2 pt-2">
                        ${q.options.map((opt, optIdx) => {
                            const isSelected = quizTakerAnswers[qIdx] === optIdx;
                            const cardClass = isSelected 
                                ? "p-4 rounded-xl border-2 border-green-600 bg-green-50 text-green-900 font-semibold cursor-pointer transition"
                                : "p-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 cursor-pointer transition";
                            return `
                                <div id="q-${qIdx}-optcard-${optIdx}" onclick="setQuizAnswer(${qIdx}, ${optIdx})" class="${cardClass}">
                                    <span class="inline-block w-6 h-6 rounded-full bg-gray-100 text-center font-bold text-xs leading-6 mr-3 text-gray-600">${String.fromCharCode(65 + optIdx)}</span>
                                    <span>${opt}</span>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`).join('');

            container.innerHTML = `
                <div class="max-w-3xl space-y-6 fade-in">
                    <div class="bg-[#0e5c32] text-white p-6 rounded-2xl shadow-sm flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-green-200">${selectedCourse.title}</span>
                            <h2 class="text-xl sm:text-2xl font-black tracking-tight mt-1">${quiz.title}</h2>
                        </div>
                        <button onclick="cancelQuizTake()" class="bg-[#094122] hover:bg-red-700 p-2.5 rounded-lg border border-[#166534] transition text-sm font-semibold flex items-center gap-1.5"><i class="fas fa-sign-out-alt"></i> Batal</button>
                    </div>

                    <div class="space-y-4">
                        ${questionsHtml}
                    </div>

                    <div class="pt-6 flex justify-end gap-2">
                        <button onclick="cancelQuizTake()" class="border px-6 py-3 bg-white text-gray-600 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">Batalkan Kuis</button>
                        <button onclick="submitQuizAnswers()" class="bg-green-700 hover:bg-green-800 text-white px-8 py-3 rounded-xl text-sm font-black tracking-wide shadow-lg transition">Kirim Jawaban</button>
                    </div>
                </div>`;
        }

        // ==============================================================================
        // 14. LOG PENGGUNA (UNTUK ADMIN)
        // ==============================================================================
        function getSystemLogsHTML() {
            return `
                <div class="bg-white rounded-lg shadow-sm border p-4 md:p-6 fade-in">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center"><i class="fas fa-list text-gray-800 mr-2"></i> Log Aktivitas Sistem</h2>
                        <div class="bg-gray-800 text-white px-3 py-1.5 rounded-md font-mono text-xs flex items-center shadow-inner">
                            <i class="fas fa-server mr-2 text-green-400"></i> Waktu Server: <span id="log-clock" class="ml-2 font-bold">${getFormattedTime()}</span>
                        </div>
                    </div>
                    
                    <div class="mb-4 flex flex-wrap gap-2">
                        <button onclick="logFilterRole='all'; render();" class="px-3 py-1 text-sm rounded ${logFilterRole==='all' ? 'bg-gray-800 text-white font-semibold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">Semua Role</button>
                        <button onclick="logFilterRole='admin'; render();" class="px-3 py-1 text-sm rounded ${logFilterRole==='admin' ? 'bg-red-600 text-white font-semibold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">Admin</button>
                        <button onclick="logFilterRole='dosen'; render();" class="px-3 py-1 text-sm rounded ${logFilterRole==='dosen' ? 'bg-blue-600 text-white font-semibold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">Dosen</button>
                        <button onclick="logFilterRole='mahasiswa'; render();" class="px-3 py-1 text-sm rounded ${logFilterRole==='mahasiswa' ? 'bg-green-600 text-white font-semibold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">Mahasiswa</button>
                    </div>

                    <div class="overflow-x-auto rounded border">
                        <table class="w-full text-left border-collapse bg-white whitespace-nowrap">
                            <thead>
                                <tr class="bg-gray-100 border-b">
                                    <th class="p-3 text-sm font-semibold w-1/4">Waktu</th>
                                    <th class="p-3 text-sm font-semibold">Pengguna</th>
                                    <th class="p-3 text-sm font-semibold">Role</th>
                                    <th class="p-3 text-sm font-semibold">Aktivitas</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${systemLogs.filter(l => logFilterRole === 'all' || l.role === logFilterRole).map(l => `
                                    <tr class="border-b hover:bg-gray-50 transition-colors">
                                        <td class="p-3 text-sm text-gray-600">${l.time}</td>
                                        <td class="p-3 text-sm font-medium text-gray-800">${l.user}</td>
                                        <td class="p-3 text-sm">
                                            <span class="px-2.5 py-1 rounded-full text-xs font-bold ${l.role === 'admin' ? 'bg-red-100 text-red-700' : l.role === 'dosen' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
                                                ${l.role.toUpperCase()}
                                            </span>
                                        </td>
                                        <td class="p-3 text-sm text-gray-700">${l.action}</td>
                                    </tr>`).join('') || '<tr><td colspan="4" class="p-4 text-center text-gray-500">Belum ada aktivitas tercatat untuk filter ini.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function initClock() {
            const clockEl = document.getElementById('log-clock');
            if(clockEl) clockEl.textContent = getFormattedTime();
        }

        // ==============================================================================
        // 15. LAPORAN & HISTORI MAHASISWA
        // ==============================================================================
        function getReportsHTML() {
            let enrolledCourses = courses.filter(c => c.enrolled.includes(currentUser.id));
            
            let coursesHtml = enrolledCourses.length > 0 
                ? enrolledCourses.map(c => `<li class="p-4 border-b bg-gray-50 flex flex-col md:flex-row justify-between items-start md:items-center"><span class="font-bold text-gray-800">${c.title}</span><span class="text-sm text-gray-500 bg-gray-200 px-2.5 py-1 rounded-lg mt-2 md:mt-0 font-semibold">${c.department}</span></li>`).join('') 
                : '<p class="p-4 text-gray-500 italic">Belum ada riwayat kelas yang diikuti.</p>';

            let quizHtml = '';
            let hasQuiz = false;
            enrolledCourses.forEach(c => {
                if (c.quizzes) {
                    c.quizzes.forEach(q => {
                        if (c.quizScores && c.quizScores[q.id] && c.quizScores[q.id][currentUser.id] !== undefined) {
                            hasQuiz = true;
                            let score = c.quizScores[q.id][currentUser.id];
                            let color = score >= 80 ? 'text-green-600' : score >= 60 ? 'text-yellow-600' : 'text-red-600';
                            quizHtml += `<li class="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <div><span class="font-bold text-gray-800">${q.title}</span><br><span class="text-xs text-gray-500"><i class="fas fa-book mr-1"></i> ${c.title}</span></div>
                                <div class="font-bold text-xl ${color}">${score}</div>
                            </li>`;
                        }
                    });
                }
            });
            if (!hasQuiz) quizHtml = '<p class="p-4 text-gray-500 italic">Belum ada riwayat pengerjaan kuis / ujian.</p>';

            return `
                <div class="max-w-5xl mx-auto fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i class="fas fa-chart-line mr-2 text-blue-600"></i> Laporan Mahasiswa</h2>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
                            <div class="bg-[#0e5c32] text-white p-4"><h3 class="font-bold"><i class="fas fa-chalkboard-teacher mr-2"></i> Riwayat Kelas yang Diikuti</h3></div>
                            <ul class="list-none">${coursesHtml}</ul>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
                            <div class="bg-green-600 text-white p-4"><h3 class="font-bold"><i class="fas fa-tasks mr-2"></i> Riwayat & Nilai Kuis</h3></div>
                            <ul class="list-none">${quizHtml}</ul>
                        </div>
                    </div>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
